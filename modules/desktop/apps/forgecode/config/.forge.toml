$schema = "https://forgecode.dev/schema.json"

# Request management
max_requests_per_turn = 50
max_tool_failure_per_turn = 3

# Model parameters
max_tokens = 20480
top_p = 0.8
top_k = 30

# Tool execution
tool_timeout_secs = 300

[retry]
max_attempts = 8
initial_backoff_ms = 200
backoff_factor = 2
min_delay_ms = 1000

[updates]
auto_update = true
frequency = "weekly"
